            color: #fffaffff;

            padding: 12px 22px;
            border-radius: 50px;
            opacity: 0.6;
            font-size: 0.9em;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s ease;
        }
        
        .tab-buttons {
            display: flex;

        }
        .tab-btn {
            flex: 1;
            padding: 12px;

            font-weight: 700;

            transition: all 0.3s;

        .tab-btn.active {
            background: #4e8387ff;

            color: #1a1a1aff;

        .tab-content {

    <script>
        // ========== ОПРЕДЕЛЯЕМ ПРОСТРАНСТВО (ПРЕФИКС) ==========
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const spaceFromUrl = urlParams.get('space');

            // ТОЛЬКО если в URL явно указан user1 — используем его
            // Иначе всегда default (ваше пространство)
            const space = (spaceFromUrl === 'user1') ? 'user1' : 'default';
            
            window.__CINEROLL_PREFIX = space === 'user1' ? 'user1_' : '';
            console.log("Текущее пространство:", space, "| Префикс:", window.__CINEROLL_PREFIX || "(нет)");

            // Обновляем ссылку "Добавить", чтобы она вела на add.html с тем же пространством
            document.addEventListener('DOMContentLoaded', function() {
                const addLink = document.getElementById('add-link');
                if (addLink && space === 'user1') {
                    addLink.href = 'add.html?space=user1';
                }
            });
        })();

        const prefix = window.__CINEROLL_PREFIX;

        // ========== ВАШ КОНФИГ FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyAOvoLXDIDZ2vVIqHLG8utXYA07yiheTkI",
            authDomain: "cineroll-54934.firebaseapp.com",
            projectId: "cineroll-54934",
            storageBucket: "cineroll-54934.firebasestorage.app",
            messagingSenderId: "158307828214",
            appId: "1:158307828214:web:6d8ed57b6d79ed80e247d7"
        };

        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let db = null;
        let currentRandomMovie = null;
        let lastRandomMovieId = null;
        let activeMoviesCache = [];
        let availableMoviesCache = [];
        
        // ========== ИНИЦИАЛИЗАЦИЯ FIREBASE ==========
        function initFirebase() {
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                db = firebase.firestore();
                console.log("Firebase подключен к проекту cineroll-54934");

       // ========== ОБНОВИТЬ СЧЕТЧИКИ ФИЛЬМОВ ==========
async function updateCounters() {
    if (!db) return;
    
    try {
        const snapshot = await db.collection(prefix + 'movies').get();
        
        let activeCount = 0;
        let postponedCount = 0;
        
        snapshot.forEach(doc => {
            const movieData = doc.data();
            if (movieData.isActive === false) {
                postponedCount++;
            } else {
                activeCount++;
            }
        });
        
        const activeCounter = document.getElementById('active-counter');
        const postponedCounter = document.getElementById('postponed-counter');
        
        activeCounter.textContent = activeCount;
        postponedCounter.textContent = postponedCount;
        
        if (activeCount === 0) {
            activeCounter.classList.add('zero');
        } else {
            activeCounter.classList.remove('zero');
        }
        
        if (postponedCount === 0) {
            postponedCounter.classList.add('zero');
        } else {
            postponedCounter.classList.remove('zero');
        }
        
        console.log(`Счетчики обновлены: активные=${activeCount}, отложенные=${postponedCount}`);
        
    } catch (error) {
        console.error("Ошибка обновления счетчиков:", error);
    }
}

        // ========== КНОПКА ПРОМОТКИ ВВЕРХ ==========
        function initScrollToTopButton() {
            const scrollToTopBtn = document.getElementById('scrollToTopBtn');
            
            if (!scrollToTopBtn) return;
            
            window.addEventListener('scroll', function() {
                if (window.pageYOffset > 300 || document.documentElement.scrollTop > 300) {
                    scrollToTopBtn.style.display = 'flex';
                } else {
                    scrollToTopBtn.style.display = 'none';
                }
            });
            
            scrollToTopBtn.addEventListener('click', function() {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
            
            scrollToTopBtn.style.display = 'none';
        }

        // ========== ПОЛУЧИТЬ СЛУЧАЙНЫЙ ФИЛЬМ ==========
async function getRandomMovie() {
    if (!db) {
        showError("Ошибка подключения к базе данных");
        return;
    }
    
    const loading = document.getElementById('loading');
    const resultDiv = document.getElementById('result');
    
    loading.style.display = 'block';
    resultDiv.innerHTML = '';
    
    try {
        const snapshot = await db.collection(prefix + 'movies').get();
        
        if (snapshot.empty) {
            resultDiv.innerHTML = `
                <div style="color: #6c757d; padding: 30px;">
                    <h3 style="color: #dc3545;">Нет доступных фильмов!</h3>
                    <p>Все фильмы отложены или список пуст</p>
                    <button class="postpone-btn" onclick="checkAndReturnPostponed()" style="margin-top: 15px;">
                        Проверить отложенные
                    </button>
                </div>
            `;
            updateCounters();
            activeMoviesCache = [];
            availableMoviesCache = [];
            lastRandomMovieId = null;
            return;
        }
        
        const activeMovies = [];
        snapshot.forEach(doc => {
            const movieData = doc.data();
            if (movieData.isActive !== false) {
                activeMovies.push({
                    id: doc.id,
                    title: movieData.title,
                    added: movieData.createdAt?.toDate() || new Date()
                });
            }
        });
        
        if (activeMovies.length === 0) {
            resultDiv.innerHTML = `
                <div style="color: #6c757d; padding: 30px;">
                    <h3 style="color: #dc3545;">Нет активных фильмов!</h3>
                    <p>Все фильмы отложены</p>
                    <button class="postpone-btn" onclick="checkAndReturnPostponed()" style="margin-top: 15px;">
                        Проверить отложенные
                    </button>
                </div>
            `;
            updateCounters();
            activeMoviesCache = [];
            availableMoviesCache = [];
            lastRandomMovieId = null;
            return;
        }
        
        activeMoviesCache = activeMovies;
        
        let moviesForSelection = [...activeMovies];
        
        if (lastRandomMovieId && moviesForSelection.length > 1) {
            const filteredMovies = moviesForSelection.filter(movie => movie.id !== lastRandomMovieId);
            if (filteredMovies.length > 0) {
                moviesForSelection = filteredMovies;
            }
        }
        
        const randomIndex = Math.floor(Math.random() * moviesForSelection.length);
        const randomMovie = moviesForSelection[randomIndex];
        
        currentRandomMovie = randomMovie;
        lastRandomMovieId = randomMovie.id;
        
        const kinopoiskUrl = `https://www.kinopoisk.ru/index.php?kp_query=${encodeURIComponent(randomMovie.title)}`;
        const vkSearchUrl = `https://vk.com/video?q=${encodeURIComponent(randomMovie.title + ' фильм')}&section=search`;
        
        resultDiv.innerHTML = `
            <div style="animation: fadeIn 0.5s;">
                <div style="font-family: Nunito; font-weight: 900; font-size: 2.2em;" class="movie-title">${randomMovie.title}</div>
                <div class="action-buttons">
                    <button 
                       onclick="watchMovie('${randomMovie.id}', '${randomMovie.title.replace(/'/g, "\\'")}', 'kinopoisk', '${kinopoiskUrl}')"
                       style="padding: 12px 22px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-weight: 900; border: none; background: #dc3545; font-size: 16px; color: white; cursor: pointer; margin: 2px;">
                        КиноПоиск
                    </button>
                    
                    <button 
                       onclick="watchMovie('${randomMovie.id}', '${randomMovie.title.replace(/'/g, "\\'")}', 'vk', '${vkSearchUrl}')"
                       style="padding: 12px 22px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-weight: 900; border: none; background: #4e8387ff; font-size: 16px; color: white; cursor: pointer; margin: 2px;">
                        VK
                    </button>
                    
                    <button class="postpone-btn" onclick="postponeMovie('${randomMovie.id}', '${randomMovie.title.replace(/'/g, "\\'")}')">
                        Смотреть позже
                    </button>
                </div>
                <div style="margin-top: 10px; padding-bottom: 15px;font-size: 0.7em; color: #999; text-align: center;">
                    Фильм будет отложен на 24 часа
                </div>
            </div>
        `;
        
    } catch (error) {
        showError(`Ошибка: ${error.message}`);
        console.error("Ошибка получения фильма:", error);
    } finally {
        loading.style.display = 'none';
    }
}

    // ========== ПОСМОТРЕТЬ ФИЛЬМ (УДАЛИТЬ ИЗ СПИСКА) ==========
async function watchMovie(movieId, movieTitle, platform, url) {
    if (!db) return;
    
    if (confirm(`Открыть ${platform === 'kinopoisk' ? 'КиноПоиск' : 'VK'} и удалить фильм "${movieTitle}" из списка?`)) {
        try {
            const newWindow = window.open(url, '_blank');
            
            if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
                alert("Всплывающие окна заблокированы. Разрешите всплывающие окна для этого сайта в настройках Safari.");
                if (confirm("Хотите скопировать ссылку для поиска?")) {
                    navigator.clipboard.writeText(url);
                    alert("Ссылка скопирована в буфер обмена!");
                }
            }
            
            setTimeout(async () => {
                try {
                    await db.collection(prefix + 'movies').doc(movieId).delete();
                    
                    const postponedSnapshot = await db.collection(prefix + 'postponedMovies')
                        .where('movieId', '==', movieId)
                        .get();
                    
                    if (!postponedSnapshot.empty) {
                        const deletePromises = [];
                        postponedSnapshot.forEach(doc => {
                            deletePromises.push(db.collection(prefix + 'postponedMovies').doc(doc.id).delete());
                        });
                        await Promise.all(deletePromises);
                    }
                    
                    activeMoviesCache = activeMoviesCache.filter(movie => movie.id !== movieId);
                    availableMoviesCache = availableMoviesCache.filter(movie => movie.id !== movieId);
                    
                    updateCounters();
                    loadMovieList();
                    loadPostponedMovies();
                    
                    setTimeout(() => {
                        location.reload();
                    }, 500);
                    
                } catch (error) {
                    console.error("Ошибка удаления фильма:", error);
                }
            }, 100);
            
        } catch (error) {
            console.error("Ошибка открытия ссылки:", error);
        }
    }
}

       // ========== ОТЛОЖИТЬ ФИЛЬМ НА 24 ЧАСА ==========
async function postponeMovie(movieId, movieTitle) {
    if (!db || !currentRandomMovie) return;
    
    const loading = document.getElementById('loading');
    loading.style.display = 'block';
    
    try {
        const now = new Date();
        const returnTime = new Date(now.getTime() + 24 * 60 * 60 * 1000);
        
        await db.collection(prefix + 'movies').doc(movieId).update({
            isActive: false,
            postponedUntil: returnTime,
            postponedAt: now
        });
        
        await db.collection(prefix + 'postponedMovies').add({
            movieId: movieId,
            title: movieTitle,
            postponedAt: now,
            returnAt: returnTime,
            returned: false
        });
        
        activeMoviesCache = activeMoviesCache.filter(movie => movie.id !== movieId);
        availableMoviesCache = availableMoviesCache.filter(movie => movie.id !== movieId);
        
        updateCounters();
        location.reload();
        
    } catch (error) {
        console.error("Ошибка при откладывании фильма:", error);
        alert("Ошибка при откладывании фильма");
    } finally {
        loading.style.display = 'none';
    }
}

        // ========== ЗАГРУЗИТЬ СПИСОК АКТИВНЫХ ФИЛЬМОВ ==========
        async function loadMovieList() {
            if (!db) return;
            
            const listElement = document.getElementById('movies-list');
            listElement.innerHTML = '<li style="text-align: center; color: #666;">Загрузка...</li>';
            
            try {
                const snapshot = await db.collection(prefix + 'movies').get();
                
                listElement.innerHTML = '';
                
                if (snapshot.empty) {
                    listElement.innerHTML = `
                        <li style="text-align: center; color: #6c757d; padding: 20px; list-style-type: none !important;">
                            Нет фильмов
                        </li>
                    `;
                    return;
                }
                
                const movies = [];
                snapshot.forEach(doc => {
                    const movieData = doc.data();
                    movies.push({
                        id: doc.id,
                        ...movieData
                    });
                });
                
                const activeMovies = movies.filter(movie => movie.isActive !== false);
                
                if (activeMovies.length === 0) {
                    listElement.innerHTML = `
                        <li style="text-align: center; color: #6c757d; padding: 20px; list-style-type: none !important;">
                            Нет активных фильмов
                        </li>
                    `;
                    return;
                }
                
                activeMovies.sort((a, b) => {
                    const dateA = a.createdAt?.toDate() || new Date(0);
                    const dateB = b.createdAt?.toDate() || new Date(0);
                    return dateB - dateA;
                });
                
                activeMovies.forEach(movie => {
                    const li = document.createElement('li');
                    li.className = 'movie-item';
                    li.innerHTML = `
                        <div>
                            <div style="font-family: Nunito; font-weight: 700; color: #fffaffff; margin-bottom: 8px; font-size: 1.2em;">${movie.title}</div>
                            <div style="font-family: Nunito; font-size: 0.7em; color: #b3b3b3ff;">
                                Добавлен: ${formatDate(movie.createdAt?.toDate())}
                            </div>
                        </div>
                        <button class="delete-btn" data-id="${movie.id}">
                            Удалить
                        </button>
                    `;
                    listElement.appendChild(li);
                });
                
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const movieId = this.getAttribute('data-id');
                        deleteMovie(movieId);
                    });
                });
                
            } catch (error) {
                console.error("Ошибка загрузки списка:", error);
                listElement.innerHTML = `
                    <li style="color: #dc3545; text-align: center;">
                        Ошибка загрузки: ${error.message}
                    </li>
                `;
            }
        }

        // ========== ЗАГРУЗИТЬ СПИСОК ОТЛОЖЕННЫХ ФИЛЬМОВ ==========
        async function loadPostponedMovies() {
            if (!db) return;
            
            const listElement = document.getElementById('postponed-list');
            listElement.innerHTML = '<li style="text-align: center; color: #666;">Загрузка...</li>';
            
            try {
                const snapshot = await db.collection(prefix + 'movies').get();
                
                listElement.innerHTML = '';
                
                if (snapshot.empty) {
                    listElement.innerHTML = `
                        <li style="text-align: center; color: #6c757d; padding: 20px; list-style-type: none !important;">
                            Нет отложенных фильмов
                        </li>
                    `;
                    return;
                }
                
                const movies = [];
                snapshot.forEach(doc => {
                    const movieData = doc.data();
                    movies.push({
                        id: doc.id,
                        ...movieData
                    });
                });
                
                const postponedMovies = movies.filter(movie => movie.isActive === false);
                
                if (postponedMovies.length === 0) {
                    listElement.innerHTML = `
                        <li style="text-align: center; color: #6c757d; padding: 20px; list-style-type: none !important;">
                            Нет отложенных фильмов
                        </li>
                    `;
                    return;
                }
                
                const now = new Date();
                
                postponedMovies.sort((a, b) => {
                    const dateA = a.postponedUntil?.toDate() || new Date(0);
                    const dateB = b.postponedUntil?.toDate() || new Date(0);
                    return dateA - dateB;
                });
                
                postponedMovies.forEach(movie => {
                    const returnTime = movie.postponedUntil?.toDate();
                    const timeLeft = returnTime ? Math.max(0, returnTime - now) : 0;
                    const hoursLeft = Math.floor(timeLeft / (1000 * 60 * 60));
                    const minutesLeft = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                    
                    const canReturn = timeLeft === 0;
                    
                    const li = document.createElement('li');
                    li.className = 'movie-item';
                    
                    let timeInfo = '';
                    if (timeLeft > 0) {
                        timeInfo = `
                            <div style="font-family: Nunito; font-size: 0.7em; color: #FFA500;">
                                Вернётся через: ${hoursLeft}ч ${minutesLeft}м
                            </div>
                            <div style="font-family: Nunito; font-size: 0.7em; color: #b3b3b3ff;">
                                До: ${returnTime ? formatDate(returnTime) : 'неизвестно'}
                            </div>
                        `;
                    } else {
                        timeInfo = `
                            <div style="font-family: Nunito; font-size: 0.7em; color: #75a744;">
                                Готов к возврату!
                            </div>
                        `;
                    }
                    
                    li.innerHTML = `
                        <div>
                            <div style="font-family: Nunito; font-weight: 700; color: #fffaffff; margin-bottom: 6px; font-size: 1.2em;">
                                ${movie.title}
                            </div>
                            ${timeInfo}
                        </div>
                        <button 
                            class="delete-btn" 
                            data-id="${movie.id}" 
                            data-postponed="true"
                            ${canReturn ? '' : 'disabled'}
                            style="${canReturn ? '' : 'opacity: 0.5; cursor: not-allowed; background: #666 !important;'}"
                        >
                            ${canReturn ? 'Вернуть' : 'Ещё рано'}
                        </button>
                    `;
                    listElement.appendChild(li);
                });
                
                document.querySelectorAll('.delete-btn[data-postponed="true"]:not([disabled])').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const movieId = this.getAttribute('data-id');
                        returnMovieNow(movieId);
                    });
                });
                
            } catch (error) {
                console.error("Ошибка загрузки отложенных фильмов:", error);
                listElement.innerHTML = `
                    <li style="color: #dc3545; text-align: center;">
                        Ошибка загрузки отложенных фильмов: ${error.message}
                    </li>
                `;
            }
        }

        // ========== ВЕРНУТЬ ФИЛЬМ СЕЙЧАС ==========
        async function returnMovieNow(movieId) {
            if (!db) return;
            
            try {
                const movieDoc = await db.collection(prefix + 'movies').doc(movieId).get();
                if (!movieDoc.exists) return;
                
                const movieData = movieDoc.data();
                const returnTime = movieData.postponedUntil?.toDate();
                const now = new Date();
                
                if (returnTime && returnTime > now) {
                    const timeLeft = returnTime - now;
                    const hoursLeft = Math.floor(timeLeft / (1000 * 60 * 60));
                    const minutesLeft = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                    
                    alert(`Фильм можно будет вернуть только через ${hoursLeft}ч ${minutesLeft}м`);
                    return;
                }
                
                if (confirm("Вернуть этот фильм в активный список сейчас?")) {
                    await db.collection(prefix + 'movies').doc(movieId).update({
                        isActive: true,
                        postponedUntil: null
                    });
                    
                    const postponedSnapshot = await db.collection(prefix + 'postponedMovies')
                        .where('movieId', '==', movieId)
                        .where('returned', '==', false)
                        .get();
                    
                    if (!postponedSnapshot.empty) {
                        postponedSnapshot.forEach(async (doc) => {
                            await db.collection(prefix + 'postponedMovies').doc(doc.id).delete();
                        });
                    }
                    
                    updateCounters();
                    loadMovieList();
                    loadPostponedMovies();
                    
                    alert("Фильм успешно возвращен в активный список!");
                }
                
            } catch (error) {
                alert("Ошибка возврата фильма: " + error.message);
                console.error("Ошибка возврата фильма:", error);
            }
        }

        // ========== ПРОВЕРИТЬ И ВЕРНУТЬ ОТЛОЖЕННЫЕ ФИЛЬМЫ ==========
        async function checkAndReturnPostponed() {
            if (!db) return;
            
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            
            try {
                const snapshot = await db.collection(prefix + 'movies').get();
                
                const now = new Date();
                let count = 0;
                
                const updates = [];
                snapshot.forEach(doc => {
                    const movie = doc.data();
                    const returnTime = movie.postponedUntil?.toDate();
                    
                    if (movie.isActive === false && returnTime && returnTime <= now) {
                        updates.push({
                            id: doc.id,
                            title: movie.title
                        });
                        count++;
                    }
                });
                
                if (count === 0) {
                    alert("Нет фильмов, которые пора вернуть");
                    return;
                }
                
                for (const update of updates) {
                    await db.collection(prefix + 'movies').doc(update.id).update({
                        isActive: true,
                        postponedUntil: null
                    });
                    
                    const postponedSnapshot = await db.collection(prefix + 'postponedMovies')
                        .where('movieId', '==', update.id)
                        .where('returned', '==', false)
                        .get();
                    
                    if (!postponedSnapshot.empty) {
                        postponedSnapshot.forEach(async (doc) => {
                            await db.collection(prefix + 'postponedMovies').doc(doc.id).delete();
                        });
                    }
                }
                
                alert(`Возвращено ${count} фильм(ов) в активный список!`);
                
                updateCounters();
                loadMovieList();
                loadPostponedMovies();
                await getRandomMovie();
                
            } catch (error) {
                console.error("Ошибка проверки отложенных фильмов:", error);
                alert("Ошибка при проверке отложенных фильмов");
            } finally {
                loading.style.display = 'none';
            }
        }

        // ========== УДАЛИТЬ ФИЛЬМ ==========
        async function deleteMovie(movieId) {
            if (!db) return;
            
            if (confirm("Удалить этот фильм из списка?")) {
                try {
                    await db.collection(prefix + 'movies').doc(movieId).delete();
                    
                    const postponedSnapshot = await db.collection(prefix + 'postponedMovies')
                        .where('movieId', '==', movieId)
                        .get();
                    
                    if (!postponedSnapshot.empty) {
                        postponedSnapshot.forEach(async (doc) => {
                            await db.collection(prefix + 'postponedMovies').doc(doc.id).delete();
                        });
                    }
                    
                    activeMoviesCache = activeMoviesCache.filter(movie => movie.id !== movieId);
                    availableMoviesCache = availableMoviesCache.filter(movie => movie.id !== movieId);
                    
                    updateCounters();
                    loadMovieList();
                    loadPostponedMovies();
                    
                } catch (error) {
                    alert("Ошибка удаления: " + error.message);
                }
            }
        }

        // ========== ИНИЦИАЛИЗИРОВАТЬ БАЗУ ДАННЫХ ==========
        async function initializeDatabase() {
            try {
                const snapshot = await db.collection(prefix + 'movies').limit(1).get();
                
                if (!snapshot.empty) {
                    const updates = [];
                    const allMovies = await db.collection(prefix + 'movies').get();
                    
                    allMovies.forEach(doc => {
                        const movieData = doc.data();
                        if (movieData.isActive === undefined) {
                            updates.push(
                                db.collection(prefix + 'movies').doc(doc.id).update({
                                    isActive: true,
                                    postponedUntil: null
                                })
                            );
                        }
                    });
                    
                    if (updates.length > 0) {
                        await Promise.all(updates);
                        console.log(`Обновлено ${updates.length} фильмов`);
                    }
                }
            } catch (error) {
                console.error("Ошибка инициализации базы:", error);
            }
        }

        // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.tab === tabName) {
                    btn.classList.add('active');
                }
            });
            
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            if (tabName === 'active') {
                document.getElementById('active-movies-tab').classList.add('active');
                loadMovieList();
            } else {
                document.getElementById('postponed-movies-tab').classList.add('active');
                loadPostponedMovies();
            }
        }

        // ========== ПОКАЗАТЬ/СКРЫТЬ СПИСОК ==========
        function toggleMovieList() {
            const container = document.getElementById('movies-list-container');
            const tabButtons = document.getElementById('tab-buttons');
            const button = document.getElementById('toggle-list-btn');
            
            if (container.style.display === 'block') {
                container.style.display = 'none';
                tabButtons.style.display = 'none';
                button.textContent = 'Показать список фильмов';
            } else {
                container.style.display = 'block';
                tabButtons.style.display = 'flex';
                button.textContent = 'Скрыть список';
                switchTab('active');
                loadMovieList();
            }
        }

        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function showError(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div style="color: #dc3545; text-align: center;">
                    <h3>Ошибка</h3>
                    <p>${message}</p>
                </div>
            `;
        }
        
        function formatDate(date) {
            if (!date) return 'неизвестно';
            return date.toLocaleDateString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ПРИЛОЖЕНИЯ ==========
document.addEventListener('DOMContentLoaded', function() {
    console.log("Запуск CineRoll...");
    
    if (!initFirebase()) {
        showError("Не удалось подключиться к базе данных");
        return;
    }
    
    initializeDatabase();
    updateCounters();
    
    document.getElementById('random-btn').addEventListener('click', getRandomMovie);
    document.getElementById('toggle-list-btn').addEventListener('click', toggleMovieList);
    
    document.querySelector('.logo').addEventListener('click', function() {
        location.reload();
    });
    
    initScrollToTopButton();
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            switchTab(this.dataset.tab);
        });
    });
    
    console.log("CineRoll готов к работе!");
});
        
        function trackAction(action, movieTitle) {
            console.log(`Действие: ${action}, Фильм: ${movieTitle}`);
        }
